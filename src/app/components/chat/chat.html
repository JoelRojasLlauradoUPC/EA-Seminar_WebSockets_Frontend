<div class="chat-wrapper">
  <!-- Cabecera del chat -->
  <header class="chat-header">
    <div class="header-info">
      <h2>Organización: {{ organizacionActivaName }}</h2>
      <span class="status-indicator">En línea</span>
    </div>
    <div class="user-badge">
      Usuario: {{ usuarioActivoName }}
    </div>
  </header>

  <!-- Lista de mensajes -->
  <div class="chat-messages" id="chat-messages">
    <div class="message-list">
      @for (mensaje of mensajes; track mensaje._id) {
        <div 
          class="message-bubble" 
          [ngClass]="{'message-mine': esMensajeMio(mensaje), 'message-other': !esMensajeMio(mensaje)}"
        >
          <div class="message-sender" *ngIf="!esMensajeMio(mensaje)">
            {{ getUsuarioName(mensaje.usuario) }}
          </div>
          <div class="message-content">
            {{ mensaje.contenido }}
          </div>
        </div>
      } @empty {
        <div class="empty-state">
          No hay mensajes todavía. ¡Escribe algo para empezar el chat!
        </div>
      }
    </div>
  </div>

  <!-- Controles de input -->
  <footer class="chat-footer">
    <form (ngSubmit)="enviarMensaje()" class="input-form">
      <input 
        type="text" 
        [(ngModel)]="nuevoMensaje" 
        name="mensajeInput" 
        placeholder="Escribe su mensaje aquí..." 
        autocomplete="off"
        class="message-input"
        required
      />
      <button type="submit" class="send-button" [disabled]="!nuevoMensaje.trim()">
        Enviar
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </form>
  </footer>
</div>
